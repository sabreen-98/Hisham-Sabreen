<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة عقد قران رقمية فاخرة مع صوت</title>
    <style>
        /* إعدادات الخلفية والخطوط الأساسية */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Amiri', 'Cairo', serif;
            background-color: #0b131a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية البطاقة التفاعلية */
        .invitation-card {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            position: relative;
            /* استبدلي الرابط أدناه برابط صورتكِ المباشر لتظهر كخلفية */
            background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1000'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 30px 20px;
            z-index: 1;
        }

        /* الساعة الرقمية والتاريخ بالأعلى */
        .digital-clock-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #2c3e50;
            margin-top: 10px;
            animation: fadeInDown 1.2s ease-out;
        }

        #clock {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
        }

        #date {
            font-size: 0.85rem;
            margin: 3px 0 0 0;
            font-family: 'Cairo', sans-serif;
            opacity: 0.9;
        }

        /* حاوية النص المنسق مع أنيميشن الدخول التفاعلي */
        .text-overlay {
            background-color: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 30px 22px;
            border-radius: 20px;
            text-align: center;
            max-width: 88%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            margin: auto 0;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
            animation: fadeInUp 1.5s ease-out;
        }

        h2 {
            font-size: 1.3rem;
            color: #2c3e50;
            margin: 0 0 15px 0;
            line-height: 1.7;
            font-weight: bold;
        }

        .invitation-body {
            font-size: 1.2rem;
            color: #34495e;
            margin: 0 0 20px 0;
            line-height: 1.7;
        }

        .invitation-footer {
            font-size: 1.1rem;
            color: #2c3e50;
            margin: 0;
            line-height: 1.7;
        }

        .floral-deco {
            font-size: 1.5rem;
            color: #c5a880;
            margin-bottom: 10px;
            animation: pulse 2s infinite ease-in-out;
        }

        /* زر تشغيل الصوت بنبضات متحركة وتأثير الدوران الموزيكي */
        .audio-control {
            margin-bottom: 15px;
            animation: fadeInUp 1.8s ease-out;
        }

            height: 55px;

            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
