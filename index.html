<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة عقد قران صابرين وهشام</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Amiri', 'Cairo', serif;
            background-color: #fceade;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية البطاقة التفاعلية - الصورة مأخوذة مباشرة من الإنترنت لتجربتها فوراً */
        .invitation-card {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            position: relative;
            background-image: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1527529482837-4698179dc6ce?q=80&w=1000'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
            z-index: 1;
        }

        /* الساعة الرقمية الشفافة بالأعلى */
        .digital-clock-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1a252f;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: fadeInDown 1.2s ease-out;
        }

        #clock {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0;
        }

        #date {
            font-size: 0.85rem;
            margin: 3px 0 0 0;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }

        /* حاوية النص الضبابية الأنيقة */
        .text-overlay {
            background-color: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin: auto 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 1.5s ease-out;
        }

        h2 {
            font-size: 1.25rem;
            color: #2c3e50;
            margin: 0 0 15px 0;
            line-height: 1.6;
            font-weight: bold;
        }

        .invitation-body {
            font-size: 1.15rem;
            color: #34495e;
            margin: 0 0 15px 0;
            line-height: 1.6;
        }

        .invitation-footer {
            font-size: 1.05rem;
            color: #2c3e50;
            margin: 0;
            line-height: 1.6;
        }

        .floral-deco {
            font-size: 1.4rem;
            color: #bfa15f;
            margin-bottom: 5px;
            animation: pulse 2s infinite ease-in-out;
        }

        /* زر تشغيل الصوت بنبضات متحركة */
        .audio-control {
            margin-bottom: 10px;
            animation: fadeInUp 1.8s ease-out;
        }

            height: 55px;
            border-radius: 50%;

            border: 1px solid rgba(255, 255, 255, 0.8);

            justify-content: center;
            align-items: center;

            position: relative;
